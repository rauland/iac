name: WireGuard example

on:
  workflow_dispatch:

jobs:
  wireguard_example:
    runs-on: ubuntu-latest
    steps:
      - run: sudo apt install wireguard

      - run: echo "${{ secrets.WIREGUARD_PRIVATE_KEY }}" > privatekey

      - run: sudo ip link add dev wg0 type wireguard

      - run: sudo ip address add dev wg0 "${{ secrets.RUNNER_IP }}" peer "${{ secrets.PEER_IP }}"

      - run: sudo wg set wg0 listen-port 48123 private-key privatekey peer "${{ secrets.WIREGUARD_PEER_PUBLIC_KEY }}" allowed-ips 0.0.0.0/0 endpoint "${{ secrets.WIREGUARD_ENDPOINT }}"

      - run: sudo ip link set up dev wg0

      - run: curl -vvv http://"${{ secrets.PEER_IP }}"
