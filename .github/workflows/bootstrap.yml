name: S3 Bootstrap for Terraform

on:
  workflow_dispatch:
    inputs:
      bucket_name:
        description: 'S3 bucket name'
        required: true
        default: 'iac-s3-bootstrap-rauland'
      region:
        description: 'AWS region'
        required: true
        default: 'ap-southeast-2'

jobs:
  bootstrap-s3:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v3
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ github.event.inputs.region }}

      - name: Create S3 bucket
        run: |
          aws s3api create-bucket \
            --bucket ${{ github.event.inputs.bucket_name }} \
            --region ${{ github.event.inputs.region }} \
            --create-bucket-configuration LocationConstraint=${{ github.event.inputs.region }} || echo "Bucket may already exist"

      - name: Enable versioning
        run: |
          aws s3api put-bucket-versioning \
            --bucket ${{ github.event.inputs.bucket_name }} \
            --versioning-configuration Status=Enabled

      - name: Enable server-side encryption
        run: |
          aws s3api put-bucket-encryption \
            --bucket ${{ github.event.inputs.bucket_name }} \
            --server-side-encryption-configuration '{
              "Rules":[
                {
                  "ApplyServerSideEncryptionByDefault":{
                    "SSEAlgorithm":"AES256"
                  }
                }
              ]
            }'