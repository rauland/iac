name: Setup SSH
description: Reusable SSH setup action for GitHub workflows
runs:
  using: "composite"
  steps:
    - run: |
        mkdir -p ~/.ssh
        echo "${{ inputs.RUNNER_SSH_KEY }}" > ~/.ssh/id_ed25519
        chmod 600 ~/.ssh/id_ed25519
        eval "$(ssh-agent -s)"
        ssh-add ~/.ssh/id_ed25519
        # ssh-keyscan -H ${{ inputs.PVE_HOST }} >> ~/.ssh/known_hosts
        ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no ${{ inputs.PVE_HOST }} 'echo SSH Connection Works'
      shell: bash
inputs:
  RUNNER_SSH_KEY:
    description: "SSH private key for the GitHub runner"
    required: true
  PVE_HOST:
    description: "Hostname or IP address of the Proxmox VE host"
    required: true
